<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Loading...</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    .screen {
      width: 100vw;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading {
      color: rgba(255, 255, 255, 0.75);
      font-family: Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    .horror {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: none;
      background: #000;
    }
  </style>
</head>

<body>
  <div class="screen" id="loading">
    <div class="loading">Loading...</div>
  </div>

  <img
    id="horror"
    class="horror"
    src="./images/prank1-upscale.jpg"
    alt=""
  />

  <script>
    setTimeout(() => {
      document.getElementById("loading").style.display = "none";
      document.getElementById("horror").style.display = "block";
    }, 1000);
  </script>
</body>
</html>
