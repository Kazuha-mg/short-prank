<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Loading...</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    .screen {
      width: 100vw;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading {
      color: rgba(255, 255, 255, 0.75);
      font-family: Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    .horror {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: none;
      background: #000;

      /* 揺れた時に端の黒が見えないように少し拡大 */
      transform: scale(1.08);
      transform-origin: center center;
    }

    .horror.wiggle {
      display: block;
      animation: horrorWiggle 0.12s infinite steps(2, end);
    }

    @keyframes horrorWiggle {
      0% {
        transform: scale(1.08) translate(0px, 0px) rotate(0deg);
      }
      20% {
        transform: scale(1.1) translate(-8px, 6px) rotate(-1.2deg);
      }
      40% {
        transform: scale(1.08) translate(7px, -5px) rotate(1deg);
      }
      60% {
        transform: scale(1.11) translate(-5px, -7px) rotate(0.8deg);
      }
      80% {
        transform: scale(1.09) translate(9px, 4px) rotate(-0.8deg);
      }
      100% {
        transform: scale(1.08) translate(-3px, 3px) rotate(0.5deg);
      }
    }
  </style>
</head>

<body>
  <div class="screen" id="loading">
    <div class="loading">読み込み中です...</div>
  </div>

  <img
    id="horror"
    class="horror"
    src="./images/prank1-upscale.jpg"
    alt=""
  />

  <script>
    setTimeout(() => {
      document.getElementById("loading").style.display = "none";
      document.getElementById("horror").classList.add("wiggle");
    }, 1000);
  </script>
</body>
</html>
